name: Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: init-client
        run: npm ci

      - name: Build APK
        working-directory: init-client
        run: npm run build:apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: init-apk
          path: init-client/android/app/build/outputs/apk/release/*.apk

  deploy:
    runs-on: ubuntu-latest
    needs: build-apk

    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: init-apk
          path: apk

      - name: Copy APK to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: apk/*.apk
          target: /home/deploy/Init/init-web/public/
          strip_components: 1

      - name: Rename APK and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 30m
          script: |
            cd /home/deploy/Init
            # Rename APK to init.apk
            mv init-web/public/app-release.apk init-web/public/init.apk 2>/dev/null || true
            git pull origin main
            COMPOSE_BAKE=false docker compose up -d --build
